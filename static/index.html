<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SESI Sumaré · Controle de Equipamentos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   TOKENS & RESET
══════════════════════════════════════ */
:root {
  --bg:       #070b12;
  --s1:       #0c1220;
  --s2:       #111827;
  --s3:       #1a2333;
  --s4:       #1f2d42;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.11);
  --border3:  rgba(255,255,255,0.18);
  --text:     #e8edf5;
  --text-sec: #6b7ea0;
  --text-dim: #3a4860;
  --blue:     #3b82f6;
  --blue-l:   #60a5fa;
  --cyan:     #22d3ee;
  --green:    #10b981;
  --green-l:  #34d399;
  --red:      #ef4444;
  --red-l:    #f87171;
  --orange:   #f59e0b;
  --orange-l: #fbbf24;
  --purple:   #8b5cf6;
  --purple-l: #a78bfa;
  --teal:     #14b8a6;
  --slot-size: 52px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body {
  font-family: "Inter", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--s4); border-radius:99px; }
.app-shell { display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  gap: 16px;
  z-index: 50;
}
.topbar-left { display:flex; align-items:center; gap:14px; }
.topbar img { height:30px; }
.topbar-divider { width:1px; height:28px; background:var(--border2); }
.topbar-title { font-size:13px; font-weight:600; color:var(--text-sec); letter-spacing:.3px; }
.topbar-right { display:flex; align-items:center; gap:10px; }
.conn-pill {
  display:flex; align-items:center; gap:6px;
  background:var(--s3); border:1px solid var(--border2);
  padding:4px 10px; border-radius:999px; font-size:11px; font-weight:600; color:var(--text-sec);
}
.conn-dot { width:7px; height:7px; border-radius:50%; background:var(--green); }
.conn-dot.off { background:var(--red); }
.conn-dot.ok { animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.topbar-time { font-family:"JetBrains Mono",monospace; font-size:12px; color:var(--text-dim); }
.navtabs {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
  scrollbar-width:none;
  z-index: 40;
}
.navtabs::-webkit-scrollbar { display:none; }
.navtab {
  flex-shrink:0;
  padding: 0 20px;
  height: 48px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-sec);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: "Inter", sans-serif;
  letter-spacing: .3px;
  transition: color .2s, border-color .2s;
  display:flex; align-items:center; gap:7px;
  white-space:nowrap;
}
.navtab:hover { color:var(--text); }
.navtab.active { color:var(--blue-l); border-bottom-color:var(--blue-l); }
.navtab.admin-tab.active { color:var(--orange-l); border-bottom-color:var(--orange-l); }
.navtab .tab-badge {
  background:var(--red); color:#fff;
  font-size:9px; font-weight:700;
  padding:1px 5px; border-radius:999px;
  line-height:1.4;
}
.main-area { flex: 1; overflow-x: hidden; background: var(--bg); }
.page { display:none; }
.page.active { display:block; }
.two-col {
  display: grid;
  grid-template-columns: 340px 1fr;
  min-height: calc(100vh - 100px);
}
.sidebar-panel {
  border-right: 1px solid var(--border);
  padding: 20px;
  background: var(--s1);
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: sticky;
  top: 100px;
  align-self: start;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
}
.content-panel { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 900px) {
  .two-col { grid-template-columns:1fr; height:auto; }
  .sidebar-panel { border-right:none; border-bottom:1px solid var(--border); }
}
.sec-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.sec-label { font-size:10px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; }
.card { background: var(--s2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.card.highlight { border-color:var(--border2); }
.field { display:flex; flex-direction:column; gap:5px; }
.field label { font-size:10px; font-weight:700; color:var(--text-sec); text-transform:uppercase; letter-spacing:.8px; }
.field input, .field select, .field textarea {
  background:var(--s3); border:1px solid var(--border2);
  border-radius:8px; padding:10px 12px;
  color:var(--text); font-size:14px; font-family:"Inter",sans-serif;
  transition:border-color .2s, box-shadow .2s; width:100%;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline:none; border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(59,130,246,.12);
}
.field select option { background:var(--s2); }
.field .hint { font-size:11px; color:var(--text-dim); }
.form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.equip-tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.etab {
  background:var(--s3); border:1px solid var(--border2);
  border-radius:9px; padding:10px 8px;
  text-align:center; cursor:pointer; transition:all .18s;
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.etab:hover { border-color:var(--border3); }
.etab.active { background:rgba(59,130,246,.1); border-color:var(--blue); }
.etab .eicon { font-size:20px; }
.etab .ename { font-size:11px; font-weight:600; color:var(--text-sec); }
.etab .ecount { font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--text-dim); }
.etab.active .ename { color:var(--blue-l); }
.etab.active .ecount { color:var(--blue); }
.jbl-strip {
  background:linear-gradient(135deg, rgba(245,158,11,.08), rgba(245,158,11,.03));
  border:1px solid rgba(245,158,11,.2);
  border-radius:10px; padding:12px 14px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.jbl-left { display:flex; align-items:center; gap:10px; }
.jbl-icon { font-size:22px; }
.jbl-name { font-size:13px; font-weight:700; color:var(--orange-l); }
.jbl-owner { font-size:11px; color:var(--text-sec); margin-top:1px; }
.jbl-right { display:flex; align-items:center; gap:8px; }
.jbl-badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:999px; }
.jbl-livre { background:rgba(16,185,129,.15); color:var(--green-l); }
.jbl-ocupado { background:rgba(239,68,68,.15); color:var(--red-l); }
.toggle-sw { position:relative; width:40px; height:22px; flex-shrink:0; }
.toggle-sw input { opacity:0; width:0; height:0; position:absolute; }
.toggle-track {
  position:absolute; inset:0; background:var(--s4);
  border-radius:999px; cursor:pointer; transition:.25s;
  border:1px solid var(--border2);
}
.toggle-track::before {
  content:""; position:absolute;
  left:2px; top:2px; width:16px; height:16px;
  border-radius:50%; background:var(--text-dim);
  transition:.25s;
}
.toggle-sw input:checked ~ .toggle-track { background:var(--orange); border-color:var(--orange); }
.toggle-sw input:checked ~ .toggle-track::before { transform:translateX(18px); background:#fff; }
.toggle-sw input:disabled ~ .toggle-track { opacity:.5; cursor:not-allowed; }
.quick-bar { display:flex; gap:6px; flex-wrap:wrap; }
.qbtn {
  display:flex; align-items:center; gap:5px;
  padding:7px 12px; border-radius:7px;
  font-size:11px; font-weight:600;
  border:1px solid var(--border2); background:var(--s3);
  color:var(--text-sec); cursor:pointer;
  font-family:"Inter",sans-serif; transition:all .18s;
  white-space:nowrap;
}
.qbtn:hover { border-color:var(--border3); color:var(--text); }
.qbtn.blue:hover { border-color:var(--blue); color:var(--blue-l); }
.qbtn.green:hover { border-color:var(--green); color:var(--green-l); }
.qbtn.red:hover { border-color:var(--red); color:var(--red-l); }
.grid-wrap { background:var(--s2); border:1px solid var(--border); border-radius:12px; padding:16px; }
.grid-legend { display:flex; gap:14px; margin-bottom:12px; flex-wrap:wrap; }
.gl-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-sec); }
.gl-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.gl-livre   { background:var(--s4); border:1px solid var(--border3); }
.gl-ocupado { background:rgba(239,68,68,.25); border:1px solid rgba(239,68,68,.5); }
.gl-sel     { background:rgba(59,130,246,.4); border:1px solid var(--blue); }
.gl-drag-hint { font-size:11px; color:var(--text-dim); margin-left:auto; }
.slot-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(var(--slot-size),1fr));
  gap:5px;
  cursor:crosshair;
}
.slot {
  height:var(--slot-size);
  border-radius:8px;
  border:1.5px solid var(--border2);
  background:var(--s3);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:2px;
  transition:background .1s, border-color .1s, transform .1s;
  position:relative; overflow:hidden;
}
.slot::after {
  content:""; position:absolute; inset:0;
  background:transparent; transition:background .1s;
  pointer-events:none;
}
.slot:hover::after { background:rgba(255,255,255,.04); }
.slot.livre { border-bottom:3px solid var(--green); }
.slot.ocupado {
  border-bottom:3px solid var(--red);
  background:rgba(239,68,68,.07);
  cursor:not-allowed;
}
.slot.sel {
  background:rgba(59,130,246,.18) !important;
  border-color:var(--blue) !important;
  border-bottom:3px solid var(--blue-l) !important;
  transform:scale(.94);
}
.slot.sel .snum { color:var(--blue-l); }
.snum { font-family:"JetBrains Mono",monospace; font-size:13px; font-weight:600; color:var(--text); line-height:1; }
.sprof { font-size:8px; font-weight:700; color:var(--red-l); max-width:90%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center; line-height:1.2; }
.ssel-count { font-size:11px; color:var(--text-sec); margin-top:10px; font-family:"JetBrains Mono",monospace; }
.ssel-count span { color:var(--blue-l); font-weight:600; }
.lasso {
  position:fixed; pointer-events:none;
  border:1.5px dashed var(--blue);
  background:rgba(59,130,246,.06);
  border-radius:4px; z-index:999;
  display:none;
}
.action-row { display:flex; flex-direction:column; gap:8px; }
.btn {
  width:100%; padding:13px 16px; border:none; border-radius:10px;
  font-family:"Inter",sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; letter-spacing:.2px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all .2s; position:relative; overflow:hidden;
}
.btn::after { content:""; position:absolute; inset:0; background:white; opacity:0; transition:opacity .15s; }
.btn:active::after { opacity:.06; }
